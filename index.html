<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rangoli Play — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#ffffff;--offwhite:#f8fafc;--cream:#f0fdf4;
    --green-50:#f0fdf4;--green-100:#dcfce7;--green-200:#bbf7d0;
    --green-300:#86efac;--green-400:#4ade80;--green-500:#22c55e;
    --green-600:#16a34a;--green-700:#15803d;--green-800:#166534;
    --text-main:#0f172a;--text-muted:#64748b;--text-light:#94a3b8;
    --border:#e2e8f0;--error:#ef4444;
    --shadow-soft:0 4px 20px rgba(15,23,42,0.06);
    --shadow-green:0 8px 30px rgba(22,163,74,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Outfit',sans-serif;
    background:var(--white);color:var(--text-main);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    position:relative;overflow-x:hidden;
  }
  .bg-layer{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 70% 50% at 10% 20%, rgba(34,197,94,0.06), transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 80%, rgba(74,222,128,0.04), transparent 55%);
  }
  .bg-grid{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(34,197,94,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.02) 1px, transparent 1px);
    background-size:60px 60px;
  }
  .leaf{
    position:fixed;pointer-events:none;z-index:0;opacity:0.12;
    animation:leafFloat linear infinite;
  }
  .leaf-1{top:-10%;left:10%;font-size:36px;animation-duration:18s;}
  .leaf-2{top:-10%;left:60%;font-size:26px;animation-duration:22s;animation-delay:-5s;}
  .leaf-3{top:-10%;left:30%;font-size:32px;animation-duration:20s;animation-delay:-10s;}
  .leaf-4{top:-10%;left:80%;font-size:28px;animation-duration:25s;animation-delay:-15s;}
  @keyframes leafFloat{
    0%{transform:translateY(0) rotate(0deg);opacity:0;}
    10%{opacity:0.12;}
    50%{transform:translateY(50vh) rotate(180deg);}
    90%{opacity:0.12;}
    100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
  }
  .page{
    position:relative;z-index:1;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:40px 20px;width:100%;
  }
  .brand-area{
    text-align:center;margin-bottom:36px;
    animation:fadeDown 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  .brand-logo{
    width:72px;height:72px;margin:0 auto 18px;border-radius:20px;
    background:linear-gradient(135deg,var(--green-500),var(--green-700));
    display:flex;align-items:center;justify-content:center;font-size:32px;
    box-shadow:0 10px 30px rgba(22,163,74,0.2),0 0 0 6px rgba(34,197,94,0.08);
    animation:logoBreathe 3s ease-in-out infinite;
  }
  @keyframes logoBreathe{
    0%,100%{box-shadow:0 10px 30px rgba(22,163,74,0.2),0 0 0 6px rgba(34,197,94,0.08);}
    50%{box-shadow:0 14px 40px rgba(22,163,74,0.3),0 0 0 10px rgba(34,197,94,0.12);}
  }
  .brand-area h1{
    font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:800;
    background:linear-gradient(135deg,var(--green-700),var(--green-500));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:4px;
  }
  .brand-area p{color:var(--text-muted);font-size:14px;font-weight:500;}
  .demo-pill{
    display:inline-flex;align-items:center;gap:6px;
    margin-top:12px;padding:5px 14px;border-radius:999px;
    background:var(--green-50);border:1px solid var(--green-200);
    color:var(--green-700);font-size:11px;font-weight:700;letter-spacing:0.3px;
  }
  .demo-pill span{
    width:6px;height:6px;border-radius:50%;background:var(--green-500);
    animation:dotPulse 1.5s ease-in-out infinite;
  }
  @keyframes dotPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4);}
    50%{box-shadow:0 0 0 5px rgba(34,197,94,0);}
  }
  .tabs-wrap{width:100%;max-width:400px;margin-bottom:24px;animation:fadeUp 0.7s 0.1s both;}
  .tabs{
    display:flex;gap:4px;background:var(--offwhite);border:1px solid var(--border);
    border-radius:14px;padding:4px;position:relative;
  }
  .tab{
    flex:1;text-align:center;padding:12px 8px;border-radius:11px;
    font-weight:600;font-size:14px;color:var(--text-muted);cursor:pointer;
    position:relative;transition:color 0.3s;border:none;background:transparent;
    font-family:'Outfit',sans-serif;z-index:1;
  }
  .tab.active{color:var(--white);}
  .tab-slider{
    position:absolute;top:4px;left:4px;height:calc(100% - 8px);
    background:linear-gradient(135deg,var(--green-500),var(--green-600));
    border-radius:11px;transition:all 0.35s cubic-bezier(0.22,1,0.36,1);
    box-shadow:var(--shadow-soft);z-index:0;
  }
  .form-wrap{width:100%;max-width:400px;animation:fadeUp 0.7s 0.2s both;}
  .field-group{position:relative;margin-bottom:16px;}
  .field-group label{
    display:block;font-size:11px;font-weight:600;color:var(--text-muted);
    text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;
  }
  .field-wrap{position:relative;}
  .field{
    width:100%;padding:14px 16px 14px 44px;border-radius:12px;
    border:1.5px solid var(--border);background:var(--white);color:var(--text-main);
    font-size:15px;font-family:'Outfit',sans-serif;outline:none;transition:all 0.25s;
  }
  .field::placeholder{color:var(--text-light);}
  .field:focus{border-color:var(--green-400);box-shadow:0 0 0 4px rgba(34,197,94,0.1);}
  .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;opacity:0.4;pointer-events:none;}
  .field-wrap:focus-within .field-icon{opacity:0.8;}
  .pw-toggle{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--text-light);cursor:pointer;font-size:15px;
  }
  .pw-toggle:hover{color:var(--green-600);}
  .strength-wrap{
    display:flex;align-items:center;gap:8px;margin-top:6px;
    opacity:0;transform:translateY(-4px);transition:all 0.3s;
  }
  .strength-wrap.show{opacity:1;transform:translateY(0);}
  .strength-bar{flex:1;height:3px;border-radius:3px;background:var(--border);overflow:hidden;}
  .strength-fill{height:100%;width:0%;border-radius:3px;transition:all 0.4s;}
  .strength-weak{background:var(--error);width:33%;}
  .strength-medium{background:#f59e0b;width:66%;}
  .strength-strong{background:var(--green-500);width:100%;}
  .strength-text{font-size:11px;font-weight:600;color:var(--text-light);}
  .error-msg{
    color:var(--error);font-size:13px;text-align:center;
    min-height:20px;margin:4px 0 8px;font-weight:600;
    animation:shake 0.4s ease;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}
  }
  .submit-btn{
    width:100%;padding:14px;border-radius:12px;border:none;
    background:linear-gradient(135deg,var(--green-500),var(--green-700));
    color:white;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
    cursor:pointer;transition:all 0.25s;box-shadow:var(--shadow-green);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 10px 25px rgba(22,163,74,0.25);}
  .submit-btn:active{transform:scale(0.98);}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .submit-btn .arrow{transition:transform 0.25s;}
  .submit-btn:hover .arrow{transform:translateX(3px);}
  .divider{
    display:flex;align-items:center;gap:14px;margin:24px 0;
    color:var(--text-light);font-size:13px;font-weight:500;
    max-width:400px;width:100%;animation:fadeUp 0.7s 0.3s both;
  }
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);}
  .social-row{
    display:flex;gap:10px;max-width:400px;width:100%;
    animation:fadeUp 0.7s 0.35s both;
  }
  .social-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:12px;border-radius:12px;background:var(--white);border:1.5px solid var(--border);
    color:var(--text-muted);font-size:14px;font-weight:600;cursor:pointer;
    transition:all 0.2s;font-family:'Outfit',sans-serif;
  }
  .social-btn:hover{border-color:var(--green-300);background:var(--green-50);color:var(--green-700);transform:translateY(-1px);}
  .footer-note{
    text-align:center;font-size:12px;color:var(--text-light);
    line-height:1.7;margin-top:28px;max-width:360px;
    animation:fadeUp 0.7s 0.4s both;
  }
  .footer-note a{color:var(--green-600);text-decoration:none;font-weight:600;}
  .loading-overlay{
    position:fixed;inset:0;z-index:100;background:rgba(255,255,255,0.95);
    backdrop-filter:blur(8px);display:flex;flex-direction:column;
    align-items:center;justify-content:center;opacity:0;pointer-events:none;
    transition:opacity 0.3s;
  }
  .loading-overlay.show{opacity:1;pointer-events:all;}
  .loading-ring{
    width:50px;height:50px;border-radius:50%;
    border:4px solid var(--green-100);border-top-color:var(--green-500);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-overlay p{margin-top:16px;color:var(--text-muted);font-size:14px;font-weight:600;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @media(max-width:480px){
    .page{padding:30px 16px;}
    .brand-area h1{font-size:26px;}
    .brand-logo{width:64px;height:64px;font-size:28px;}
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="leaf leaf-1">🍃</div>
<div class="leaf leaf-2">🌿</div>
<div class="leaf leaf-3">🍀</div>
<div class="leaf leaf-4">🌱</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-ring"></div>
  <p id="loadingText">Signing in…</p>
</div>

<div class="page">
  <div class="brand-area">
    <div class="brand-logo">🎰</div>
    <h1>Rangoli Play</h1>
    <p>Predict colors. Win big. Play smart.</p>
    <div class="demo-pill"><span></span> DEPOSIT AND WIN BIG MONEY</div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs" id="tabContainer">
      <div class="tab-slider" id="tabSlider"></div>
      <button class="tab active" data-mode="login" onclick="switchTab('login')">Log In</button>
      <button class="tab" data-mode="signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
  </div>

  <form class="form-wrap" id="authForm" onsubmit="return false;" autocomplete="off">
    <div class="field-group">
      <label>Email Address</label>
      <div class="field-wrap">
        <span class="field-icon">✉️</span>
        <input class="field" id="authEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
    </div>
    <div class="field-group">
      <label id="pwLabel">Password</label>
      <div class="field-wrap">
        <span class="field-icon">🔒</span>
        <input class="field" id="authPassword" type="password" placeholder="Enter your password" autocomplete="current-password" required minlength="6" />
        <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePassword()">👁️</button>
      </div>
      <div class="strength-wrap" id="strengthWrap">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span class="strength-text" id="strengthText">Weak</span>
      </div>
    </div>
    <div class="error-msg" id="authError"></div>
    <button class="submit-btn" id="authSubmitBtn" onclick="handleSubmit()">
      <span id="btnText">Log In</span><span class="arrow">→</span>
    </button>
  </form>

  <div class="divider">or continue with</div>
  <div class="social-row">
    <button class="social-btn" onclick="guestLogin()">
      <span>👤</span> Guest Mode
    </button>
  </div>

  <p class="footer-note">
    By continuing, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a>.<br>
    This is a demo build for practice — no real money involved.
  </p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyDheB4bhPXnUHhV_YzuXT9P4dwt2PguoSU",
  authDomain: "makingos.firebaseapp.com",
  databaseURL: "https://makingos-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "makingos",
  storageBucket: "makingos.firebasestorage.app",
  messagingSenderId: "564081962844",
  appId: "1:564081962844:web:fcf6e6edd3f27edf07db99",
  measurementId: "G-CN0E5S2QP9"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ================= STATE =================
let mode = 'login';
const emailEl = document.getElementById('authEmail');
const pwEl = document.getElementById('authPassword');
const errorEl = document.getElementById('authError');
const btnEl = document.getElementById('authSubmitBtn');
const btnText = document.getElementById('btnText');
const slider = document.getElementById('tabSlider');
const strengthWrap = document.getElementById('strengthWrap');
const strengthFill = document.getElementById('strengthFill');
const strengthText = document.getElementById('strengthText');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingText = document.getElementById('loadingText');

// ================= TABS =================
function switchTab(newMode){
  mode = newMode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === newMode));
  const activeTab = document.querySelector('.tab[data-mode="' + newMode + '"]');
  slider.style.width = activeTab.offsetWidth + 'px';
  slider.style.transform = 'translateX(' + activeTab.offsetLeft + 'px)';
  btnText.textContent = newMode === 'login' ? 'Log In' : 'Create Account';
  document.getElementById('pwLabel').textContent = newMode === 'login' ? 'Password' : 'Create Password';
  errorEl.textContent = '';
  if(newMode === 'login') strengthWrap.classList.remove('show');
}
setTimeout(() => switchTab('login'), 50);

// ================= PASSWORD =================
function togglePassword(){
  const isPw = pwEl.type === 'password';
  pwEl.type = isPw ? 'text' : 'password';
  document.getElementById('pwToggle').textContent = isPw ? '🙈' : '👁️';
}

pwEl.addEventListener('input', function(){
  if(mode === 'login') return;
  const val = pwEl.value;
  if(val.length === 0){ strengthWrap.classList.remove('show'); return; }
  strengthWrap.classList.add('show');
  let score = 0;
  if(val.length >= 6) score++;
  if(val.length >= 10) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  strengthFill.className = 'strength-fill';
  if(score <= 2){
    strengthFill.classList.add('strength-weak');
    strengthText.textContent = 'Weak'; strengthText.style.color = 'var(--error)';
  } else if(score <= 4){
    strengthFill.classList.add('strength-medium');
    strengthText.textContent = 'Medium'; strengthText.style.color = '#f59e0b';
  } else {
    strengthFill.classList.add('strength-strong');
    strengthText.textContent = 'Strong'; strengthText.style.color = 'var(--green-500)';
  }
});

// ================= SUBMIT =================
function handleSubmit(){
  const email = emailEl.value.trim();
  const password = pwEl.value;
  errorEl.textContent = '';

  if(!email || !password){ errorEl.textContent = 'Please fill in all fields.'; return; }
  if(password.length < 6){ errorEl.textContent = 'Password must be at least 6 characters.'; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ errorEl.textContent = 'Please enter a valid email.'; return; }

  showLoading(mode === 'login' ? 'Signing in…' : 'Creating account…');
  btnEl.disabled = true;

  if(mode === 'login'){
    auth.signInWithEmailAndPassword(email, password)
      .then(() => { onAuthSuccess('Welcome Back!'); })
      .catch(err => { handleAuthError(err); });
  } else {
    auth.createUserWithEmailAndPassword(email, password)
      .then(cred => {
        // Create user record in database
        const uid = cred.user.uid;
        const record = {
          email: email, mainBalance: 0, demoBalance: 10000,
          createdAt: Date.now(), playerId: String(Math.floor(10000 + Math.random()*90000)),
          username: 'Player', totalDeposited: 0, totalWithdrawn: 0,
          totalWins: 0, totalLosses: 0, gamesPlayed: 0, transactions: []
        };
        return db.ref('users/' + uid).set(record);
      })
      .then(() => { onAuthSuccess('Account Created!'); })
      .catch(err => { handleAuthError(err); });
  }
}

function handleAuthError(err){
  hideLoading(); btnEl.disabled = false;
  const map = {
    'auth/invalid-email': 'That email address looks invalid.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/user-not-found': 'No account found. Try Sign Up.',
    'auth/email-already-in-use': 'Email already registered. Try Log In.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/too-many-requests': 'Too many attempts. Please try again later.',
    'auth/invalid-credential': 'Invalid email or password.'
  };
  errorEl.textContent = map[err.code] || err.message || 'Something went wrong. Please try again.';
}

function onAuthSuccess(title){
  sessionStorage.setItem('rangoli_auth', JSON.stringify({
    authenticated: true, timestamp: Date.now(), title: title
  }));
  loadingText.textContent = 'Redirecting…';
  setTimeout(() => { window.location.href = 'redirect.html'; }, 600);
}

function guestLogin(){
  showLoading('Entering as Guest…');
  auth.signInAnonymously()
    .then(() => {
      const uid = auth.currentUser.uid;
      const record = {
        email: 'guest@rangoli.play', mainBalance: 0, demoBalance: 10000,
        createdAt: Date.now(), playerId: String(Math.floor(10000 + Math.random()*90000)),
        username: 'Guest', totalDeposited: 0, totalWithdrawn: 0,
        totalWins: 0, totalLosses: 0, gamesPlayed: 0, transactions: []
      };
      return db.ref('users/' + uid).set(record);
    })
    .then(() => { onAuthSuccess('Welcome, Guest!'); })
    .catch(err => { handleAuthError(err); });
}

function showLoading(text){
  loadingText.textContent = text;
  loadingOverlay.classList.add('show');
}
function hideLoading(){
  loadingOverlay.classList.remove('show');
}

// ================= AUTO-REDIRECT IF ALREADY LOGGED IN =================
auth.onAuthStateChanged(user => {
  if(user){
    // Already logged in, go straight to redirect
    sessionStorage.setItem('rangoli_auth', JSON.stringify({
      authenticated: true, timestamp: Date.now(), title: 'Welcome Back!'
    }));
    window.location.href = 'redirect.html';
  }
});

// ================= ENTER KEY =================
pwEl.addEventListener('keypress', e => { if(e.key === 'Enter') handleSubmit(); });
emailEl.addEventListener('keypress', e => { if(e.key === 'Enter') handleSubmit(); });
</script>
</body>
</html>
