<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rangoli Play — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#ffffff;
    --offwhite:#f8fafc;
    --lightgreen:#dcfce7;
    --green-50:#f0fdf4;
    --green-100:#dcfce7;
    --green-200:#bbf7d0;
    --green-300:#86efac;
    --green-400:#4ade80;
    --green-500:#22c55e;
    --green-600:#16a34a;
    --green-700:#15803d;
    --green-800:#166534;
    --green-900:#14532d;
    --text-main:#0f172a;
    --text-muted:#64748b;
    --text-light:#94a3b8;
    --border:#e2e8f0;
    --error:#ef4444;
    --shadow-soft:0 4px 20px rgba(22,163,74,0.08);
    --shadow-medium:0 8px 30px rgba(22,163,74,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Outfit',sans-serif;
    background:var(--white);
    color:var(--text-main);
    overflow-x:hidden;
    min-height:100vh;
  }

  /* ================= BACKGROUND LAYERS ================= */
  .bg-layer{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 70% 50% at 10% 20%, rgba(34,197,94,0.08), transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 80%, rgba(74,222,128,0.06), transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(220,252,231,0.4), transparent 50%);
  }
  .bg-grid{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(34,197,94,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.03) 1px, transparent 1px);
    background-size:60px 60px;
  }

  /* Floating leaves */
  .leaf{
    position:fixed;pointer-events:none;z-index:0;opacity:0.15;
    animation:leafFloat linear infinite;
  }
  .leaf-1{top:-10%;left:10%;font-size:40px;animation-duration:18s;animation-delay:0s;}
  .leaf-2{top:-10%;left:60%;font-size:28px;animation-duration:22s;animation-delay:-5s;}
  .leaf-3{top:-10%;left:30%;font-size:35px;animation-duration:20s;animation-delay:-10s;}
  .leaf-4{top:-10%;left:80%;font-size:32px;animation-duration:25s;animation-delay:-15s;}
  .leaf-5{top:-10%;left:45%;font-size:26px;animation-duration:19s;animation-delay:-8s;}
  @keyframes leafFloat{
    0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:0;}
    10%{opacity:0.15;}
    50%{transform:translateY(50vh) rotate(180deg) translateX(30px);}
    90%{opacity:0.15;}
    100%{transform:translateY(110vh) rotate(360deg) translateX(-20px);opacity:0;}
  }

  /* ================= MAIN LAYOUT ================= */
  .page{
    position:relative;z-index:1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }

  /* ================= TOP BRAND AREA ================= */
  .brand-area{
    text-align:center;margin-bottom:40px;
    animation:fadeDown 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }
  .brand-logo{
    width:80px;height:80px;margin:0 auto 20px;
    border-radius:24px;
    background:linear-gradient(135deg, var(--green-500), var(--green-700));
    display:flex;align-items:center;justify-content:center;
    font-size:36px;
    box-shadow:0 12px 40px rgba(22,163,74,0.25), 0 0 0 8px rgba(34,197,94,0.08);
    position:relative;
    animation:logoBreathe 3s ease-in-out infinite;
  }
  @keyframes logoBreathe{
    0%,100%{box-shadow:0 12px 40px rgba(22,163,74,0.25), 0 0 0 8px rgba(34,197,94,0.08);}
    50%{box-shadow:0 16px 50px rgba(22,163,74,0.35), 0 0 0 12px rgba(34,197,94,0.12);}
  }
  .brand-logo::after{
    content:"";position:absolute;inset:-4px;border-radius:28px;
    border:2px solid rgba(34,197,94,0.15);animation:ringPulse 2s ease-in-out infinite;
  }
  @keyframes ringPulse{
    0%,100%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.08);opacity:0.5;}
  }
  .brand-area h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:36px;font-weight:800;
    background:linear-gradient(135deg, var(--green-700), var(--green-500));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:6px;
  }
  .brand-area p{color:var(--text-muted);font-size:15px;font-weight:500;}
  .demo-tag{
    display:inline-flex;align-items:center;gap:6px;
    margin-top:14px;padding:6px 16px;border-radius:999px;
    background:var(--green-50);border:1px solid var(--green-200);
    color:var(--green-700);font-size:12px;font-weight:700;letter-spacing:0.3px;
  }
  .demo-tag span{
    width:6px;height:6px;border-radius:50%;background:var(--green-500);
    animation:dotPulse 1.5s ease-in-out infinite;
  }
  @keyframes dotPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4);}
    50%{box-shadow:0 0 0 5px rgba(34,197,94,0);}
  }

  /* ================= TABS ================= */
  .tabs-wrap{
    width:100%;max-width:420px;margin-bottom:28px;
    animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.1s both;
  }
  .tabs{
    display:flex;gap:4px;
    background:var(--offwhite);
    border:1px solid var(--border);
    border-radius:16px;
    padding:5px;
    position:relative;
  }
  .tab{
    flex:1;text-align:center;padding:13px 8px;
    border-radius:12px;font-weight:600;font-size:15px;
    color:var(--text-muted);cursor:pointer;position:relative;
    transition:color 0.3s ease;
    border:none;background:transparent;font-family:'Outfit',sans-serif;
    z-index:1;
  }
  .tab.active{color:var(--white);}
  .tab-slider{
    position:absolute;top:5px;left:5px;height:calc(100% - 10px);
    background:linear-gradient(135deg, var(--green-500), var(--green-600));
    border-radius:12px;
    transition:all 0.35s cubic-bezier(0.22,1,0.36,1);
    box-shadow:var(--shadow-soft);
    z-index:0;
  }

  /* ================= FORM ================= */
  .form-wrap{
    width:100%;max-width:420px;
    animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s both;
  }
  .field-group{position:relative;margin-bottom:18px;}
  .field-group label{
    display:block;font-size:12px;font-weight:600;
    color:var(--text-muted);text-transform:uppercase;letter-spacing:0.7px;
    margin-bottom:7px;padding-left:2px;
  }
  .field-wrap{position:relative;}
  .field{
    width:100%;padding:15px 18px 15px 48px;
    border-radius:14px;border:1.5px solid var(--border);
    background:var(--white);color:var(--text-main);
    font-size:15px;font-family:'Outfit',sans-serif;outline:none;
    transition:all 0.25s ease;
  }
  .field::placeholder{color:var(--text-light);}
  .field:focus{
    border-color:var(--green-400);
    box-shadow:0 0 0 4px rgba(34,197,94,0.1), var(--shadow-soft);
  }
  .field-icon{
    position:absolute;left:16px;top:50%;transform:translateY(-50%);
    font-size:18px;opacity:0.4;pointer-events:none;transition:all 0.25s;
  }
  .field-wrap:focus-within .field-icon{opacity:1;}
  .pw-toggle{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--text-light);cursor:pointer;font-size:16px;padding:4px;
    transition:color 0.2s;
  }
  .pw-toggle:hover{color:var(--green-600);}

  /* Strength */
  .strength-wrap{
    display:flex;align-items:center;gap:8px;margin-top:8px;opacity:0;transform:translateY(-4px);
    transition:all 0.3s ease;
  }
  .strength-wrap.show{opacity:1;transform:translateY(0);}
  .strength-bar{flex:1;height:4px;border-radius:4px;background:var(--border);overflow:hidden;}
  .strength-fill{height:100%;width:0%;border-radius:4px;transition:all 0.4s ease;}
  .strength-weak{background:var(--error);width:33%;}
  .strength-medium{background:#f59e0b;width:66%;}
  .strength-strong{background:var(--green-500);width:100%;}
  .strength-text{font-size:11px;font-weight:600;color:var(--text-light);}

  /* Submit */
  .submit-btn{
    width:100%;padding:16px;
    border-radius:14px;border:none;
    background:linear-gradient(135deg, var(--green-500), var(--green-700));
    color:white;font-family:'Outfit',sans-serif;
    font-size:16px;font-weight:700;cursor:pointer;
    position:relative;overflow:hidden;
    transition:all 0.25s ease;
    box-shadow:var(--shadow-medium);
    margin-top:6px;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 35px rgba(22,163,74,0.3);
  }
  .submit-btn:active{transform:scale(0.98);}
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
  .submit-btn .arrow{transition:transform 0.25s ease;}
  .submit-btn:hover .arrow{transform:translateX(4px);}

  /* Error */
  .error-msg{
    color:var(--error);font-size:13.5px;text-align:center;
    min-height:22px;margin:6px 0 8px;font-weight:600;
    animation:shake 0.4s ease;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-3px);}
    80%{transform:translateX(3px);}
  }

  /* Divider */
  .divider{
    display:flex;align-items:center;gap:16px;
    margin:28px 0;color:var(--text-light);font-size:13px;font-weight:500;
    max-width:420px;width:100%;
    animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s both;
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;background:linear-gradient(90deg, transparent, var(--border), transparent);
  }

  /* Social */
  .social-row{
    display:flex;gap:12px;max-width:420px;width:100%;
    animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.35s both;
  }
  .social-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:14px;border-radius:14px;
    background:var(--white);border:1.5px solid var(--border);
    color:var(--text-muted);font-size:14px;font-weight:600;
    cursor:pointer;transition:all 0.2s ease;font-family:'Outfit',sans-serif;
  }
  .social-btn:hover{
    border-color:var(--green-300);
    background:var(--green-50);
    color:var(--green-700);
    transform:translateY(-1px);
    box-shadow:var(--shadow-soft);
  }

  /* Footer */
  .footer-note{
    text-align:center;font-size:12.5px;color:var(--text-light);
    line-height:1.7;margin-top:32px;max-width:380px;
    animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.4s both;
  }
  .footer-note a{color:var(--green-600);text-decoration:none;font-weight:600;}
  .footer-note a:hover{text-decoration:underline;}

  /* Success overlay (full screen) */
  .success-screen{
    position:fixed;inset:0;z-index:100;
    background:var(--white);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity 0.5s ease;
  }
  .success-screen.show{opacity:1;pointer-events:all;}
  .success-circle{
    width:90px;height:90px;border-radius:50%;
    background:linear-gradient(135deg, var(--green-400), var(--green-600));
    display:flex;align-items:center;justify-content:center;
    font-size:40px;color:white;
    box-shadow:0 15px 40px rgba(22,163,74,0.3);
    animation:popScale 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes popScale{
    from{transform:scale(0);opacity:0;}
    to{transform:scale(1);opacity:1;}
  }
  .success-screen h2{
    margin-top:24px;font-family:'Space Grotesk',sans-serif;
    font-size:28px;font-weight:700;color:var(--text-main);
    animation:fadeUp 0.5s ease 0.2s both;
  }
  .success-screen p{
    margin-top:6px;color:var(--text-muted);font-size:15px;
    animation:fadeUp 0.5s ease 0.3s both;
  }
  .success-loader{
    margin-top:24px;width:40px;height:40px;
    border:3px solid var(--green-100);
    border-top-color:var(--green-500);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Animations */
  @keyframes fadeDown{
    from{opacity:0;transform:translateY(-20px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* Responsive */
  @media(max-width:480px){
    .page{padding:30px 16px;}
    .brand-area h1{font-size:28px;}
    .brand-logo{width:68px;height:68px;font-size:30px;}
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer"></div>
<div class="bg-grid"></div>

<!-- Floating leaves -->
<div class="leaf leaf-1">🍃</div>
<div class="leaf leaf-2">🌿</div>
<div class="leaf leaf-3">🍀</div>
<div class="leaf leaf-4">🌱</div>
<div class="leaf leaf-5">🍃</div>

<!-- Success Screen -->
<div class="success-screen" id="successScreen">
  <div class="success-circle">✓</div>
  <h2 id="successTitle">Welcome Back!</h2>
  <p id="successText">Preparing your dashboard…</p>
  <div class="success-loader"></div>
</div>

<!-- Main Page -->
<div class="page">

  <!-- Brand -->
  <div class="brand-area">
    <div class="brand-logo">🎰</div>
    <h1>Rangoli Play</h1>
    <p>Predict colors. Win big. Play smart.</p>
    <div class="demo-tag"><span></span> DEMO MODE — NO REAL MONEY</div>
  </div>

  <!-- Tabs -->
  <div class="tabs-wrap">
    <div class="tabs" id="tabContainer">
      <div class="tab-slider" id="tabSlider"></div>
      <button class="tab active" data-mode="login" onclick="switchTab('login')">Log In</button>
      <button class="tab" data-mode="signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
  </div>

  <!-- Form -->
  <form class="form-wrap" id="authForm" onsubmit="return false;" autocomplete="off">
    <div class="field-group">
      <label>Email Address</label>
      <div class="field-wrap">
        <span class="field-icon">✉️</span>
        <input class="field" id="authEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
    </div>

    <div class="field-group">
      <label id="pwLabel">Password</label>
      <div class="field-wrap">
        <span class="field-icon">🔒</span>
        <input class="field" id="authPassword" type="password" placeholder="Enter your password" autocomplete="current-password" required minlength="6" />
        <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePassword()">👁️</button>
      </div>
      <div class="strength-wrap" id="strengthWrap">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span class="strength-text" id="strengthText">Weak</span>
      </div>
    </div>

    <div class="error-msg" id="authError"></div>

    <button class="submit-btn" id="authSubmitBtn" onclick="handleSubmit()">
      <span id="btnText">Log In</span>
      <span class="arrow">→</span>
    </button>
  </form>

  <!-- Divider -->
  <div class="divider">or continue with</div>

  <!-- Social -->
  <div class="social-row">
    <button class="social-btn" onclick="socialLogin('google')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google
    </button>
    <button class="social-btn" onclick="socialLogin('guest')">
      <span>👤</span> Guest
    </button>
  </div>

  <!-- Footer -->
  <p class="footer-note">
    By continuing, you agree to our <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a>.<br>
    This is a demo build for practice — no real money transactions.
  </p>

</div>

<script>
// ==================== TABS ====================
let mode = 'login';
const slider = document.getElementById('tabSlider');
const btnText = document.getElementById('btnText');
const pwLabel = document.getElementById('pwLabel');
const strengthWrap = document.getElementById('strengthWrap');

function switchTab(newMode){
  mode = newMode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === newMode));
  const activeTab = document.querySelector(`.tab[data-mode="${newMode}"]`);
  slider.style.width = activeTab.offsetWidth + 'px';
  slider.style.transform = `translateX(${activeTab.offsetLeft}px)`;
  btnText.textContent = newMode === 'login' ? 'Log In' : 'Create Account';
  pwLabel.textContent = newMode === 'login' ? 'Password' : 'Create Password';
  document.getElementById('authError').textContent = '';
  if(newMode === 'login'){
    strengthWrap.classList.remove('show');
  }
}
setTimeout(() => switchTab('login'), 50);

// ==================== PASSWORD ====================
const pwEl = document.getElementById('authPassword');
const pwToggle = document.getElementById('pwToggle');
const strengthFill = document.getElementById('strengthFill');
const strengthText = document.getElementById('strengthText');

function togglePassword(){
  const isPw = pwEl.type === 'password';
  pwEl.type = isPw ? 'text' : 'password';
  pwToggle.textContent = isPw ? '🙈' : '👁️';
}

pwEl.addEventListener('input', () => {
  if(mode === 'login') return;
  const val = pwEl.value;
  if(val.length === 0){ strengthWrap.classList.remove('show'); return; }
  strengthWrap.classList.add('show');
  let score = 0;
  if(val.length >= 6) score++;
  if(val.length >= 10) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  strengthFill.className = 'strength-fill';
  if(score <= 2){
    strengthFill.classList.add('strength-weak');
    strengthText.textContent = 'Weak';
    strengthText.style.color = 'var(--error)';
  } else if(score <= 4){
    strengthFill.classList.add('strength-medium');
    strengthText.textContent = 'Medium';
    strengthText.style.color = '#f59e0b';
  } else {
    strengthFill.classList.add('strength-strong');
    strengthText.textContent = 'Strong';
    strengthText.style.color = 'var(--green-500)';
  }
});

// ==================== SUBMIT ====================
const emailEl = document.getElementById('authEmail');
const errorEl = document.getElementById('authError');
const btnEl = document.getElementById('authSubmitBtn');

function handleSubmit(){
  const email = emailEl.value.trim();
  const password = pwEl.value;
  errorEl.textContent = '';

  if(!email || !password){
    errorEl.textContent = 'Please fill in all fields.';
    return;
  }
  if(password.length < 6){
    errorEl.textContent = 'Password must be at least 6 characters.';
    return;
  }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    errorEl.textContent = 'Please enter a valid email address.';
    return;
  }

  btnEl.disabled = true;
  const originalText = btnText.textContent;
  btnText.textContent = mode === 'login' ? 'Signing in…' : 'Creating account…';

  setTimeout(() => {
    btnEl.disabled = false;
    btnText.textContent = originalText;
    const title = mode === 'login' ? 'Welcome Back!' : 'Account Created!';
    const subtitle = mode === 'login' ? 'Preparing your dashboard…' : 'Let's get you started…';
    showSuccess(title, subtitle);
  }, 1500);
}

function socialLogin(provider){
  btnEl.disabled = true;
  const originalText = btnText.textContent;
  btnText.textContent = provider === 'google' ? 'Connecting…' : 'Entering…';
  setTimeout(() => {
    btnEl.disabled = false;
    btnText.textContent = originalText;
    const title = provider === 'google' ? 'Google Connected!' : 'Welcome, Guest!';
    showSuccess(title, 'Setting things up…');
  }, 1200);
}

function showSuccess(title, subtitle){
  // Save auth state to sessionStorage so redirect page knows user is legit
  sessionStorage.setItem('rangoli_auth', JSON.stringify({
    authenticated: true,
    timestamp: Date.now(),
    title: title
  }));
  // Navigate to access verification page
  window.location.href = 'redirect.html';
}

// Enter key
pwEl.addEventListener('keypress', e => { if(e.key === 'Enter') handleSubmit(); });
emailEl.addEventListener('keypress', e => { if(e.key === 'Enter') handleSubmit(); });
</script>
</body>
</html>
